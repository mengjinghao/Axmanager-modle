<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>系统监控面板</title>
<style>
:root{--p:#34d399;--s:#1e1e2e;--sv:#2a2a3e;--os:#e8e6f0;--osv:#9b99ad;--ol:#3d3d55;--er:#f87171;--su:#4ade80;--wa:#fbbf24;--r:16px;--inset-b:env(safe-area-inset-bottom,0px);--inset-t:env(safe-area-inset-top,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:#111118;color:var(--os);padding:0 0 calc(100px+var(--inset-b)) 0;min-height:100vh}
.header{padding:calc(20px+var(--inset-t)) 20px 16px;background:linear-gradient(135deg,var(--p)18 0%,transparent 70%)}
.header h1{font-size:22px;font-weight:700;color:var(--p)}.header .sub{font-size:13px;color:var(--osv);margin-top:4px}
.toolbar{display:flex;gap:6px;margin:8px 16px}
.toolbar select{flex:1;padding:8px 12px;border-radius:10px;background:var(--s);color:var(--os);border:1px solid var(--ol);font-size:13px}
.toolbar button{padding:8px 14px;border-radius:10px;border:none;background:var(--p);color:#000;font-weight:600;font-size:13px;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 16px}
.gauge{background:var(--s);border:1px solid var(--ol);border-radius:var(--r);padding:14px;text-align:center}
.gauge .val{font-size:28px;font-weight:700;margin:4px 0}
.gauge .lbl{font-size:11px;color:var(--osv)}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin:12px 16px}
.action-btn{flex:1;min-width:100px;padding:12px 10px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;background:var(--sv);color:var(--os);border:1px solid var(--ol);transition:all .2s}
.action-btn:active{transform:scale(.97);opacity:.8}
.status{margin:8px 16px;padding:10px 14px;border-radius:10px;background:var(--sv);font-size:12px;color:var(--osv);display:none}
.status.show{display:block}.status.ok{color:var(--su)}.status.err{color:var(--er)}
</style>
</head>
<body>
<div class="header"><h1>系统监控面板</h1><div class="sub">CPU · 内存 · 电池 · 网络 实时数据</div></div>
<div class="toolbar">
  <select id="interval" onchange="updateInterval()"><option value="3">刷新: 3秒</option><option value="1">1秒</option><option value="5" selected>5秒</option><option value="10">10秒</option></select>
  <button onclick="refreshAll()">立即刷新</button>
</div>
<div class="grid">
  <div class="gauge"><div class="lbl">CPU使用率</div><div class="val" id="cpuVal" style="color:#f87171">--</div></div>
  <div class="gauge"><div class="lbl">RAM占用</div><div class="val" id="ramVal" style="color:#fbbf24">--</div></div>
  <div class="gauge"><div class="lbl">电池温度</div><div class="val" id="tempVal" style="color:#fb923c">--</div></div>
  <div class="gauge"><div class="lbl">电池电量</div><div class="val" id="battVal" style="color:#4ade80">--</div></div>
</div>
<div class="actions">
  <button class="action-btn" onclick="quickAction('screenshot')">截图保存</button>
  <button class="action-btn" onclick="quickAction('restart_ui')">重启SystemUI</button>
  <button class="action-btn" onclick="quickAction('clear_cache')" style="background:#3d1010;border-color:#f87171;color:#f87171">清系统缓存</button>
</div>
<div class="status" id="status"></div>
<script>
const MODDIR='/data/user_de/0/com.android.shell/axeron/plugins/system_monitor_ax';
let refreshTimer=null,refreshSec=5;
function execCmd(cmd){return new Promise(function(res,rej){try{if(typeof ksu!=='undefined'&&typeof ksu.exec==='function')res(String(ksu.exec(cmd)).trim());else if(typeof kernelsu!=='undefined'&&typeof kernelsu.exec==='function')kernelsu.exec(cmd).then(function(r){res((r.stdout||r.stderr||'').trim())}).catch(rej);else if(typeof Axeron!=='undefined'&&typeof Axeron.exec==='function'){var j=Axeron.exec(cmd,null);res(j?JSON.parse(j).out||'':'')}else rej(new Error('请在AXManager中打开'))}catch(e){rej(e)}})}
function parseVal(text,key){var lines=text.split('\n');for(var i=0;i<lines.length;i++){if(lines[i].indexOf(key)>=0){var parts=lines[i].split(':');if(parts.length>1)return parts.slice(1).join(':').trim()}}return'--'}
async function refreshAll(){try{var out=await execCmd('sh '+MODDIR+'/install.sh all');var lines=out.split('\n');
  for(var i=0;i<lines.length;i++){var l=lines[i];
    if(l.indexOf('%')>=0&&l.length<30){var t=l.trim();document.getElementById('cpuVal').textContent=t}
    if(l.indexOf('Total RAM')>=0||l.indexOf('Used RAM')>=0){document.getElementById('ramVal').textContent=l.split(':').pop().trim()}
    if(l.indexOf('temperature')>=0){var v=l.split(':').pop().trim().replace(/[^0-9.]/g,'');if(v.length<10)document.getElementById('tempVal').textContent=(parseFloat(v)/10).toFixed(1)+'°C'}
    if(l.indexOf('level')>=0){document.getElementById('battVal').textContent=l.split(':').pop().trim().replace(/[^0-9]/g,'')+'%'}
  }}catch(e){}
}
function updateInterval(){refreshSec=parseInt(document.getElementById('interval').value);clearInterval(refreshTimer);refreshTimer=setInterval(refreshAll,refreshSec*1000);refreshAll()}
function quickAction(mode){var s=document.getElementById('status');s.className='status show';s.textContent='执行中...';execCmd('sh '+MODDIR+'/install.sh '+mode).then(function(o){s.textContent=mode==='screenshot'?'截图已保存到/sdcard/ax_screenshot.png':o||'完成';s.className='status show ok';if(mode==='restart_ui')setTimeout(function(){location.reload()},2000)}).catch(function(e){s.textContent='失败';s.className='status show err'})}
updateInterval();
</script>
</body>
</html>
