<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>ADB快捷工具箱</title>
<style>
:root{--p:#f59e0b;--s:#1e1e2e;--sv:#2a2a3e;--os:#e8e6f0;--osv:#9b99ad;--ol:#3d3d55;--er:#f87171;--su:#4ade80;--inset-b:env(safe-area-inset-bottom,0px);--inset-t:env(safe-area-inset-top,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:#111118;color:var(--os);padding:0 0 calc(80px+var(--inset-b)) 0;min-height:100vh}
.header{padding:calc(20px+var(--inset-t)) 20px 16px;background:linear-gradient(135deg,var(--p)18 0%,transparent 70%)}
.header h1{font-size:22px;font-weight:700;color:var(--p)}.header .sub{font-size:13px;color:var(--osv);margin-top:4px}
.section{margin:12px 16px}
.section-title{font-size:13px;font-weight:600;color:var(--osv);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{flex:1;min-width:80px;padding:14px 8px;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;background:var(--sv);color:var(--os);border:1px solid var(--ol);transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.96);opacity:.8}
.btn-accent{background:var(--p);color:#0d0810;border-color:var(--p)}
.btn-danger{background:#3d1010;border-color:var(--er);color:var(--er)}
.btn-success{background:#103020;border-color:var(--su);color:var(--su)}
.status{margin:8px 16px;padding:12px 14px;border-radius:12px;background:var(--sv);font-size:13px;color:var(--osv);display:none;line-height:1.5}
.status.show{display:block}.status.ok{color:var(--su)}.status.err{color:var(--er)}
</style>
</head>
<body>
<div class="header"><h1>ADB快捷工具箱</h1><div class="sub">截图 · 录屏 · DPI · SystemUI · 缓存清理</div></div>

<div class="section"><div class="section-title">● 屏幕操作</div><div class="row">
<button class="btn btn-accent" onclick="run('screenshot')">截图保存</button>
<button class="btn" onclick="run('screenrecord_start')" id="recStart">开始录屏</button>
<button class="btn btn-danger" onclick="run('screenrecord_stop')">停止录屏</button>
</div></div>

<div class="section"><div class="section-title">● DPI快速切换</div><div class="row">
<button class="btn" onclick="run('dpi_380')">380 (小视野)</button>
<button class="btn btn-accent" onclick="run('dpi_440')">440 (标准)</button>
<button class="btn" onclick="run('dpi_480')">480 (大字体)</button>
</div></div>

<div class="section"><div class="section-title">● 系统控制</div><div class="row">
<button class="btn" onclick="run('restart_ui')">重启SystemUI</button>
<button class="btn btn-danger" onclick="run('clear_cache')">清缓存</button>
<button class="btn btn-success" onclick="run('freeze_background')">冻结后台</button>
</div></div>

<button style="display:block;width:calc(100%-32px);margin:12px 16px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;background:var(--er);color:#fff" onclick="resetAll()">卸载恢复全部设置</button>
<div class="status" id="status"></div>

<script>
const MODDIR='/data/user_de/0/com.android.shell/axeron/plugins/adb_toolbox_ax';
function execCmd(cmd){return new Promise(function(res,rej){try{if(typeof ksu!=='undefined'&&typeof ksu.exec==='function')res(String(ksu.exec(cmd)).trim());else if(typeof kernelsu!=='undefined'&&typeof kernelsu.exec==='function')kernelsu.exec(cmd).then(function(r){res((r.stdout||r.stderr||'完成').trim())}).catch(rej);else if(typeof Axeron!=='undefined'&&typeof Axeron.exec==='function'){var j=Axeron.exec(cmd,null);res(j?JSON.parse(j).out||'完成':'完成')}else rej(new Error('请在AXManager中打开'))}catch(e){rej(e)}})}
function run(mode){var s=document.getElementById('status'),n={screenshot:'正在截图...',screenrecord_start:'正在开始录屏...',screenrecord_stop:'正在停止录屏...',dpi_380:'正在设置DPI=380...',dpi_440:'正在设置DPI=440...',dpi_480:'正在设置DPI=480...',restart_ui:'正在重启SystemUI...',clear_cache:'正在清理缓存...',freeze_background:'正在冻结后台...'};s.className='status show';s.textContent=n[mode]||'';execCmd('sh '+MODDIR+'/install.sh '+mode).then(function(o){s.textContent=o||'完成';s.className='status show ok';if(mode==='restart_ui')setTimeout(function(){location.reload()},2000)}).catch(function(e){s.textContent='失败：'+e.message;s.className='status show err'})}
function resetAll(){var s=document.getElementById('status');s.className='status show';s.textContent='正在恢复全部设置...';execCmd('sh '+MODDIR+'/uninstall.sh').then(function(o){s.textContent=o||'已恢复';s.className='status show ok'}).catch(function(e){s.textContent='失败：'+e.message;s.className='status show err'})}
</script>
</body>
</html>
