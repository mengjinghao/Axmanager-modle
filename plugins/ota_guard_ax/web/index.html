<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>OTA更新阻断守护</title>
<style>
:root{--p:#f87171;--s:#1a1a28;--sv:#252538;--os:#e8e6f0;--osv:#9b99ad;--ol:#353550;--er:#f87171;--su:#4ade80;--wa:#fbbf24;--r:18px;--inset-b:env(safe-area-inset-bottom,0px);--inset-t:env(safe-area-inset-top,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',system-ui,sans-serif;background:#0d0d18;color:var(--os);min-height:100vh;overflow-x:hidden}
/* 玻璃拟态头部 */
.hdr{position:relative;padding:calc(32px+var(--inset-t)) 20px 24px;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% -20%,var(--p)22,transparent 60%)}
.hdr::after{content:'';position:absolute;inset:0;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);mask:linear-gradient(to bottom,#000 40%,transparent)}
.hdr-inner{position:relative;z-index:1}
.hdr h1{font-size:26px;font-weight:800;color:var(--p);letter-spacing:-.5px;margin-bottom:4px}
.hdr .sub{font-size:13px;color:var(--osv);opacity:.8}
.hdr .icon-row{display:flex;gap:6px;margin-top:12px}
.hdr .chip{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:500;background:var(--p)18;color:var(--p);border:1px solid var(--p)33}

/* 提示卡片 */
.warn{margin:0 16px 12px;padding:14px 16px;border-radius:14px;background:var(--p)08;border:1px solid var(--p)22;font-size:12px;line-height:1.6}
.warn strong{color:var(--p);display:block;margin-bottom:2px}
.warn span{color:var(--osv)}

/* 分区标题 */
.sect{margin:20px 16px 8px;font-size:12px;font-weight:700;color:var(--osv);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.sect::after{content:'';flex:1;height:1px;background:var(--ol)}

/* 模式卡片 */
.cards{margin:0 16px}
.card{position:relative;padding:16px;margin-bottom:10px;background:var(--s);border:1.5px solid var(--ol);border-radius:var(--r);cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.card:active{transform:scale(.985)}
.card.sel{border-color:var(--p);background:linear-gradient(135deg,var(--p)0a 0%,var(--s) 60%);box-shadow:0 0 0 1px var(--p)15,0 4px 16px var(--p)10}
.card-row{display:flex;align-items:flex-start;gap:14px}
.card-icon{width:40px;height:40px;min-width:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s}
.card.sel .card-icon{transform:scale(1.1)}
.card-body{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:700;color:var(--os);line-height:1.3}
.card-desc{font-size:12px;color:var(--osv);margin-top:3px;line-height:1.4}
/* 参数预览 */
.card-tags{margin-top:0;max-height:0;overflow:hidden;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1)}
.card.sel .card-tags{margin-top:12px;max-height:120px;opacity:1}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:500;background:var(--p)12;color:var(--p);border:1px solid var(--p)22}
/* 选中勾 */
.card-check{position:absolute;top:12px;right:14px;width:22px;height:22px;border-radius:50%;border:2px solid var(--ol);display:flex;align-items:center;justify-content:center;transition:all .3s}
.card.sel .card-check{border-color:var(--p);background:var(--p);box-shadow:0 0 12px var(--p)44}
.card.sel .card-check::after{content:'✓';font-size:13px;color:#000;font-weight:800;line-height:1}

/* 按钮 */
.btns{padding:0 16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:15px 20px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-go{background:var(--p);color:#000;box-shadow:0 4px 20px var(--p)33}
.btn-reset{background:transparent;color:var(--er);border:1.5px solid var(--er)33;margin-top:8px}
/* 吐司 */
.toast{position:fixed;bottom:calc(90px+var(--inset-b));left:50%;transform:translateX(-50%) translateY(100px);max-width:calc(100%-48px);min-width:260px;padding:14px 18px;border-radius:16px;background:var(--s);border:1px solid var(--ol);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;gap:10px;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1s infinite}
.toast .dot.ok{background:var(--su);animation:none}.toast .dot.err{background:var(--er);animation:none}.toast .dot.busy{background:var(--p)}
.toast .msg{font-size:13px;color:var(--os);line-height:1.4;flex:1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* 底部 */
.ft{text-align:center;padding:20px 16px 30px;font-size:11px;color:var(--osv);opacity:.5;line-height:1.6}
</style>
</head>
<body>

<div class="hdr"><div class="hdr-inner">
  <h1>OTA更新阻断守护</h1>
  <div class="sub">扫描冻结OTA服务 · 阻止静默升级 · 后台守护</div>
  <div class="icon-row">
    <span class="chip">pm disable-user</span>
    <span class="chip">settings全局</span>
    <span class="chip">setprop阻止</span>
  </div>
</div></div>

<div class="warn"><strong>⚠ 重要提醒</strong><span>pm disable-user冻结在重启后保持。如需系统更新请切换到「临时放行」模式解冻所有OTA组件。</span></div>

<div class="sect"><span>⚡ 选择阻断策略</span></div>
<div class="cards" id="cards"></div>

<div class="btns">
  <button class="btn btn-go" onclick="applyNow()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    应用所选策略
  </button>
  <button class="btn btn-reset" onclick="resetAll()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    恢复全部OTA组件
  </button>
</div>

<div class="toast" id="toast"><div class="dot" id="tdot"></div><div class="msg" id="tmsg"></div></div>
<div class="ft">AXManager Plugin · 表层ADB修改 · 安全可逆</div>

<script>
// ========== 插件配置（每个插件修改此处）==========
const CONFIG = {
  moddir: '/data/user_de/0/com.android.shell/axeron/plugins/ota_guard_ax',
  modes: [
    {id:'block_all',   color:'#f87171', icon:'🛡️', title:'全面阻断',    desc:'扫描并冻结全部OTA/更新/升级组件',           tags:['OTA服务','FOTA','系统更新','firmware','全部厂商']},
    {id:'light',       color:'#fbbf24', icon:'🔹', title:'轻度拦截',    desc:'仅冻结厂商核心静默升级组件',                  tags:['小米systemAd','OPPO ota','vivo updater','华为hwouc','三星sdm']},
    {id:'allow',       color:'#4ade80', icon:'🔓', title:'临时放行',    desc:'解冻全部OTA组件，允许系统更新正常进行',       tags:['解冻全部','恢复更新','自动更新开启']}
  ]
};
// =================================================

let selMode=CONFIG.modes[0].id;
function renderCards(){
  const c=document.getElementById('cards');
  CONFIG.modes.forEach(function(m){
    const d=document.createElement('div');d.className='card'+(m.id===selMode?' sel':'');
    d.setAttribute('data-mode',m.id);
    d.innerHTML='<div class="card-row"><div class="card-icon" style="background:'+m.color+'22">'+m.icon+'</div><div class="card-body"><div class="card-title">'+m.title+'</div><div class="card-desc">'+m.desc+'</div></div></div><div class="card-tags"><div class="tags">'+m.tags.map(function(t){return'<span class="tag">'+t+'</span>'}).join('')+'</div></div><div class="card-check"></div>';
    d.addEventListener('click',function(){
      document.querySelectorAll('.card').forEach(function(e){e.classList.remove('sel')});
      this.classList.add('sel');selMode=this.getAttribute('data-mode');
    });
    c.appendChild(d);
  });
}
renderCards();

// ===== 吐司 =====
let tt=null;
function toast(msg,type){
  const t=document.getElementById('toast'),td=document.getElementById('tdot'),tm=document.getElementById('tmsg');
  clearTimeout(tt);t.classList.remove('show');td.className='dot';tm.textContent='';
  setTimeout(function(){tm.textContent=msg;td.className='dot '+(type||'busy');t.classList.add('show');if(type!=='busy')tt=setTimeout(function(){t.classList.remove('show')},2500)},80);
}

// ===== 命令执行 =====
function execCmd(cmd){return new Promise(function(res,rej){try{if(typeof ksu!=='undefined'&&typeof ksu.exec==='function')res(String(ksu.exec(cmd)).trim());else if(typeof kernelsu!=='undefined'&&typeof kernelsu.exec==='function')kernelsu.exec(cmd).then(function(r){res((r.stdout||r.stderr||'完成').trim())}).catch(rej);else if(typeof Axeron!=='undefined'&&typeof Axeron.exec==='function'){var j=Axeron.exec(cmd,null);res(j?JSON.parse(j).out||'完成':'完成')}else rej(new Error('请在AXManager中打开'))}catch(e){rej(e)}})}

// ===== 应用模式 =====
async function applyNow(){
  const names={};CONFIG.modes.forEach(function(m){names[m.id]=m.title});
  toast('正在切换 '+names[selMode]+'...','busy');
  try{const o=await execCmd('sh '+CONFIG.moddir+'/install.sh '+selMode);toast(o||names[selMode]+' 已生效','ok')}catch(e){toast('失败: '+(e.message||e),'err')}
}

// ===== 恢复原厂 =====
async function resetAll(){
  toast('正在恢复全部OTA组件...','busy');
  try{const o=await execCmd('sh '+CONFIG.moddir+'/uninstall.sh');toast(o||'已恢复系统更新功能','ok')}catch(e){toast('失败: '+(e.message||e),'err')}
}
</script>
</body>
</html>
