<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>手游画质调度</title>
<style>
/* ---- 设计令牌 ---- */
:root {
  --p: #a78bfa; --op: #0d0a17; --s: #1e1e2e; --sv: #2a2a3e;
  --os: #e8e6f0; --osv: #9b99ad; --ol: #3d3d55; --er: #f87171;
  --su: #4ade80; --wa: #fbbf24; --r: 16px; --e1: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.5);
  --e2: 0 4px 8px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.5);
  --e3: 0 8px 20px rgba(0,0,0,.4), 0 4px 8px rgba(0,0,0,.5);
  --inset-b: env(safe-area-inset-bottom, 0px);
  --inset-t: env(safe-area-inset-top, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--ol); border-radius: 99px; }
body {
  font-family: -apple-system, 'Noto Sans SC', system-ui, sans-serif;
  background: linear-gradient(180deg, #181828 0%, #111118 100%);
  color: var(--os); padding: 0 0 calc(100px + var(--inset-b)) 0;
  min-height: 100vh; overflow-x: hidden;
}

/* ---- 头部 ---- */
.header {
  padding: calc(24px + var(--inset-t)) 20px 20px;
  background: linear-gradient(135deg, var(--p)22 0%, transparent 80%);
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, var(--p)15 0%, transparent 70%);
}
.header h1 { font-size: 24px; font-weight: 700; color: var(--p); letter-spacing: -.3px; }
.header .sub { font-size: 13px; color: var(--osv); margin-top: 4px; line-height: 1.5; }
.header .chips { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.header .chip {
  padding: 3px 10px; border-radius: 99px; font-size: 11px;
  background: var(--sv); color: var(--osv); border: 1px solid var(--ol);
}

/* ---- 卡片 ---- */
.card {
  background: var(--s); border: 1px solid var(--ol); border-radius: var(--r);
  padding: 16px; margin: 12px 16px; box-shadow: var(--e1);
  transition: transform .2s, box-shadow .2s;
}
.card-tip { border-left: 3px solid var(--wa); background: #2a2410; }
.card-tip .ct { color: var(--wa); font-size: 13px; font-weight: 600; }
.card-tip .cd { color: #b0a070; font-size: 12px; margin-top: 4px; line-height: 1.5; }

/* ---- 模式选择 ---- */
.mode-group { margin: 0 16px; }
.sec-title { font-size: 13px; font-weight: 600; color: var(--osv); margin: 16px 16px 8px; text-transform: uppercase; letter-spacing: .5px; }

.mode-card {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px; margin-bottom: 10px;
  background: var(--s); border: 2px solid var(--ol); border-radius: var(--r);
  cursor: pointer; transition: all .3s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden; box-shadow: var(--e1);
}
.mode-card:active { transform: scale(.98); }
.mode-card.selected {
  border-color: var(--p); background: linear-gradient(135deg, var(--p)08 0%, transparent 60%);
  box-shadow: 0 0 0 1px var(--p)22, var(--e2);
}

/* Radio点 */
.mode-radio {
  width: 22px; height: 22px; min-width: 22px; border-radius: 50%;
  border: 2px solid var(--osv); display: flex; align-items: center;
  justify-content: center; transition: all .3s; margin-top: 2px;
}
.mode-card.selected .mode-radio { border-color: var(--p); }
.mode-radio::after {
  content: ''; width: 12px; height: 12px; border-radius: 50%;
  background: transparent; transition: all .2s;
}
.mode-card.selected .mode-radio::after { background: var(--p); box-shadow: 0 0 8px var(--p); }

.mode-content { flex: 1; min-width: 0; }
.mode-title { font-size: 15px; font-weight: 600; color: var(--os); }
.mode-subtitle { font-size: 12px; color: var(--osv); margin-top: 2px; }

/* 参数预览（展开收起） */
.param-preview {
  margin-top: 0; max-height: 0; overflow: hidden;
  transition: all .35s cubic-bezier(.4,0,.2,1); opacity: 0;
}
.mode-card.selected .param-preview {
  margin-top: 12px; max-height: 200px; opacity: 1;
}
.param-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.param-tag {
  padding: 4px 10px; border-radius: 99px; font-size: 11px;
  background: var(--sv); color: var(--p); border: 1px solid var(--p)33;
}

/* ---- 按钮 ---- */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 32px); margin: 8px 16px; padding: 14px; border: none;
  border-radius: var(--r); font-size: 15px; font-weight: 600;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform .15s, box-shadow .2s;
  box-shadow: var(--e1);
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--p); color: var(--op); }
.btn-danger { background: var(--er); color: #fff; }
.btn-danger:active { background: #ef4444; }
.btn-outline {
  background: transparent; color: var(--os); border: 1px solid var(--ol);
}
.btn-outline:active { background: var(--sv); }

/* ---- 波纹 ---- */
.ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,.15); transform: scale(0); animation: ripple .6s ease-out; pointer-events: none; }
@keyframes ripple { to { transform: scale(4); opacity: 0; } }

/* ---- FAB 悬浮按钮 ---- */
.fab-container {
  position: fixed; bottom: calc(24px + var(--inset-b)); right: 20px;
  z-index: 1000; display: flex; flex-direction: column-reverse; align-items: center; gap: 12px;
}
.fab-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  opacity: 0; visibility: hidden; transition: all .3s; z-index: 999;
  backdrop-filter: blur(2px);
}
.fab-backdrop.open { opacity: 1; visibility: visible; }

.fab-main {
  width: 56px; height: 56px; border-radius: 16px; border: none;
  background: var(--p); color: var(--op); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--e3); transition: all .3s cubic-bezier(.4,0,.2,1);
  position: relative; z-index: 1001;
}
.fab-main:active { transform: scale(.92); }
.fab-main svg { transition: transform .3s; }
.fab-main.open svg { transform: rotate(45deg); }

.fab-item {
  width: 48px; height: 48px; border-radius: 14px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--e2); position: relative; z-index: 1001;
  transform: scale(0); opacity: 0; transition: all .3s cubic-bezier(.4,0,.2,1);
}
.fab-backdrop.open ~ .fab-item,
.fab-container.open .fab-item {
  transform: scale(1); opacity: 1;
}
.fab-item:nth-child(1) { transition-delay: .05s; }
.fab-item:nth-child(2) { transition-delay: .1s; }
.fab-item:nth-child(3) { transition-delay: .15s; }

.fab-label {
  position: absolute; right: 60px; white-space: nowrap;
  padding: 4px 12px; border-radius: 8px; background: var(--s);
  font-size: 12px; font-weight: 500; color: var(--os);
  border: 1px solid var(--ol); box-shadow: var(--e1);
  opacity: 0; transform: translateX(10px); transition: all .25s;
  pointer-events: none;
}
.fab-item:hover .fab-label { opacity: 1; transform: translateX(0); }

/* ---- Snackbar ---- */
.snackbar {
  position: fixed; bottom: calc(90px + var(--inset-b)); left: 50%; transform: translateX(-50%) translateY(80px);
  max-width: calc(100% - 48px); min-width: 280px; padding: 14px 20px;
  border-radius: 12px; background: #2a2a3e; border: 1px solid var(--ol);
  box-shadow: var(--e3); z-index: 2000; display: flex; align-items: center; gap: 10px;
  opacity: 0; transition: all .35s cubic-bezier(.4,0,.2,1); pointer-events: none;
}
.snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.snackbar .snk-icon { width: 20px; height: 20px; flex-shrink: 0; }
.snackbar .snk-text { font-size: 13px; color: var(--os); line-height: 1.4; flex: 1; }

/* ---- Dialog ---- */
.dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 3000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; transition: all .25s; backdrop-filter: blur(3px);
}
.dialog-overlay.open { opacity: 1; visibility: visible; }
.dialog-box {
  background: var(--s); border: 1px solid var(--ol); border-radius: 20px;
  padding: 24px 20px 16px; width: calc(100% - 64px); max-width: 340px;
  box-shadow: var(--e3); transform: scale(.9); transition: transform .25s;
}
.dialog-overlay.open .dialog-box { transform: scale(1); }
.dialog-title { font-size: 17px; font-weight: 700; color: var(--os); margin-bottom: 8px; }
.dialog-msg { font-size: 14px; color: var(--osv); line-height: 1.5; margin-bottom: 20px; }
.dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
.dialog-actions button {
  padding: 10px 20px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s;
}
.dialog-actions button:active { opacity: .7; }
.dialog-cancel { background: var(--sv); color: var(--os); }
.dialog-confirm { background: var(--er); color: #fff; }
</style>
</head>
<body>

<!-- 头部 -->
<div class="header">
  <h1>手游画质调度</h1>
  <div class="sub">GPU渲染 · 帧率 · 温控 三档策略</div>
  <div class="chips">
    <span class="chip">王者荣耀</span>
    <span class="chip">和平精英</span>
    <span class="chip">原神</span>
    <span class="chip">星穹铁道</span>
  </div>
</div>

<!-- 提示 -->
<div class="card card-tip">
  <div class="ct">&#9432; 重要说明</div>
  <div class="cd">ADB 表层修改，重启后失效需重新切换。settings 属性 ADB 权限可用；setprop 部分需 system 级权限，失败自动跳过。</div>
</div>

<!-- 模式选择 -->
<div class="sec-title">&#9679; 选择模式</div>
<div class="mode-group" id="modeGroup"></div>

<!-- 通用优化 -->
<div class="card" style="margin-top:4px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--osv)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <span style="font-size:14px;font-weight:600;color:var(--os)">自动启用的通用优化</span>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:4px">
    <span class="param-tag" style="color:var(--wa);border-color:var(--wa)33">关闭动态分辨率</span>
    <span class="param-tag" style="color:var(--wa);border-color:var(--wa)33">提升触控采样</span>
    <span class="param-tag" style="color:var(--wa);border-color:var(--wa)33">防降亮度</span>
  </div>
</div>

<!-- 恢复按钮 -->
<button class="btn btn-danger" onclick="showDialog()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
  一键恢复原厂参数
</button>

<!-- FAB 背景 -->
<div class="fab-backdrop" id="fabBackdrop" onclick="toggleFab()"></div>

<!-- FAB -->
<div class="fab-container" id="fabContainer">
  <button class="fab-main" id="fabMain" onclick="toggleFab()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<!-- Snackbar -->
<div class="snackbar" id="snackbar">
  <div class="snk-icon" id="snkIcon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--su)" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
  </div>
  <div class="snk-text" id="snkText">操作成功</div>
</div>

<!-- Dialog -->
<div class="dialog-overlay" id="dialogOverlay">
  <div class="dialog-box">
    <div class="dialog-title">确认恢复原厂？</div>
    <div class="dialog-msg">将清除所有自定义 GPU／帧率／温控参数，恢复系统默认值。</div>
    <div class="dialog-actions">
      <button class="dialog-cancel" onclick="closeDialog()">取消</button>
      <button class="dialog-confirm" onclick="confirmReset()">确认恢复</button>
    </div>
  </div>
</div>

<script>
// ---- 配置 ----
const MODDIR = '/data/user_de/0/com.android.shell/axeron/plugins/game_gpu_tune_ax';

// ---- 命令执行：支持 ksu(同步)、kernelsu(异步)、Axeron(JSON) API ----
function execCmd(cmd, msg) {
  showSnackbar(msg, 'info');
  try {
    let output = '';
    // 1) ksu.exec(cmd) — 同步，直接返回 stdout
    if (typeof ksu !== 'undefined' && typeof ksu.exec === 'function') {
      output = String(ksu.exec(cmd));
    }
    // 2) kernelsu.exec(cmd) — 异步，返回 Promise<{stdout,stderr,errno}>
    else if (typeof kernelsu !== 'undefined' && typeof kernelsu.exec === 'function') {
      kernelsu.exec(cmd).then(function(result) {
        const text = (result.stdout || result.stderr || '执行完成').trim();
        const last = text.split('\n').pop();
        showSnackbar(last, 'success');
      }).catch(function(e) {
        showSnackbar('执行失败: ' + e.message, 'error');
      });
      return;
    }
    // 3) Axeron.exec() — 返回 JSON
    else if (typeof Axeron !== 'undefined' && typeof Axeron.exec === 'function') {
      const json = Axeron.exec(cmd, null);
      output = json ? (JSON.parse(json).out || '') : '';
    }
    else {
      showSnackbar('请在 AXManager 中打开此面板', 'info');
      return;
    }
    const lines = output.trim().split('\n');
    showSnackbar(lines[lines.length-1] || '执行完成', 'success');
  } catch(e) {
    showSnackbar('执行失败: ' + (e.message || e), 'error');
  }
}

const modes = [
  {
    id: 'performance', color: '#f87171',
    title: '🔥 性能模式', subtitle: '拉满帧率 · 解温控 · 高渲染',
    params: ['GPU: 最大频率', '帧率: 120fps', '温控: 48°C', '渲染: 高采样', '动态分辨率: 关闭']
  },
  {
    id: 'balance', color: '#fbbf24',
    title: '⚖️ 均衡模式', subtitle: '平衡性能与功耗 · 标准散热',
    params: ['GPU: 适中频率', '帧率: 90fps', '温控: 45°C', '渲染: 标准', '动态分辨率: 关闭']
  },
  {
    id: 'power_saver', color: '#4ade80',
    title: '🔋 省电模式', subtitle: '降频节能 · 收紧温控 · 延长续航',
    params: ['GPU: 降频低频', '帧率: 60fps', '温控: 42°C', '渲染: 低功耗', '动态分辨率: 关闭']
  }
];

let selectedMode = 'balance';

// ---- 渲染模式卡片 ----
const group = document.getElementById('modeGroup');
modes.forEach(m => {
  const card = document.createElement('div');
  card.className = 'mode-card' + (m.id === selectedMode ? ' selected' : '');
  card.dataset.mode = m.id;
  card.innerHTML = `
    <div class="mode-radio"></div>
    <div class="mode-content">
      <div class="mode-title">${m.title}</div>
      <div class="mode-subtitle">${m.subtitle}</div>
      <div class="param-preview">
        <div class="param-grid">
          ${m.params.map(p => `<span class="param-tag">${p}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
  card.addEventListener('click', function(e) {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
    this.classList.add('selected');
    selectedMode = this.dataset.mode;
    closeFab();
  });
  group.appendChild(card);
});

// ---- 创建 FAB 子项 ----
modes.forEach((m, i) => {
  const item = document.createElement('button');
  item.className = 'fab-item';
  item.style.cssText = `background:${m.color};transition-delay:${(i*0.05)+0.05}s`;
  item.dataset.mode = m.id;
  const label = m.id === 'performance' ? '性能' : m.id === 'balance' ? '均衡' : '省电';
  item.innerHTML = `<span class="fab-label">${label}模式</span>${label}`;
  item.addEventListener('click', function() {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`.mode-card[data-mode="${this.dataset.mode}"]`).classList.add('selected');
    selectedMode = this.dataset.mode;
    closeFab();
    execCmd('sh ' + MODDIR + '/install.sh ' + selectedMode, '正在切换 ' + this.textContent.trim() + ' 模式...');
  });
  document.getElementById('fabContainer').insertBefore(item, document.getElementById('fabMain'));
});

// ---- FAB 控制 ----
function toggleFab() {
  const c = document.getElementById('fabContainer');
  const b = document.getElementById('fabBackdrop');
  const m = document.getElementById('fabMain');
  const isOpen = c.classList.toggle('open');
  b.classList.toggle('open', isOpen);
  m.classList.toggle('open', isOpen);
}
function closeFab() {
  document.getElementById('fabContainer').classList.remove('open');
  document.getElementById('fabBackdrop').classList.remove('open');
  document.getElementById('fabMain').classList.remove('open');
}

// ---- Snackbar ----
let snackbarTimer;
function showSnackbar(text, type) {
  const sb = document.getElementById('snackbar');
  const icon = document.getElementById('snkIcon');
  clearTimeout(snackbarTimer);
  sb.classList.remove('show');
  setTimeout(() => {
    document.getElementById('snkText').textContent = text;
    const color = type === 'success' ? 'var(--su)' : type === 'error' ? 'var(--er)' : 'var(--wa)';
    icon.innerHTML = type === 'success'
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
    sb.classList.add('show');
    snackbarTimer = setTimeout(() => sb.classList.remove('show'), 3000);
  }, 50);
}

// ---- Dialog ----
function showDialog() { document.getElementById('dialogOverlay').classList.add('open'); }
function closeDialog() { document.getElementById('dialogOverlay').classList.remove('open'); }
function confirmReset() {
  closeDialog();
  execCmd('sh ' + MODDIR + '/uninstall.sh', '正在恢复原厂参数...');
}

// ---- 波纹效果 ----
document.querySelectorAll('.btn,.fab-main,.fab-item,.dialog-actions button').forEach(el => {
  el.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = this.getBoundingClientRect();
    r.style.cssText = `left:${e.clientX - rect.left - 10}px;top:${e.clientY - rect.top - 10}px;width:20px;height:20px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });
});
</script>
</body>
</html>
