<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>界面美化微调</title>
<style>
:root {
  --p: #60a5fa; --op: #0a1629; --s: #1e1e2e; --sv: #2a2a3e;
  --os: #e8e6f0; --osv: #9b99ad; --ol: #3d3d55; --er: #f87171;
  --su: #4ade80; --wa: #fbbf24; --r: 16px; --e1: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.5);
  --e2: 0 4px 8px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.5);
  --e3: 0 8px 20px rgba(0,0,0,.4), 0 4px 8px rgba(0,0,0,.5);
  --inset-b: env(safe-area-inset-bottom,0px); --inset-t: env(safe-area-inset-top,0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--ol); border-radius:99px; }
body {
  font-family:-apple-system,'Noto Sans SC',system-ui,sans-serif;
  background:linear-gradient(180deg,#18202e 0%,#111118 100%);
  color:var(--os); padding:0 0 calc(100px+var(--inset-b)) 0; min-height:100vh; overflow-x:hidden;
}
.header { padding:calc(24px+var(--inset-t)) 20px 20px; background:linear-gradient(135deg,var(--p)22 0%,transparent 80%); position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,var(--p)15 0%,transparent 70%); }
.header h1 { font-size:24px; font-weight:700; color:var(--p); letter-spacing:-.3px; }
.header .sub { font-size:13px; color:var(--osv); margin-top:4px; line-height:1.5; }
.card { background:var(--s); border:1px solid var(--ol); border-radius:var(--r); padding:16px; margin:12px 16px; box-shadow:var(--e1); }
.card-tip { border-left:3px solid var(--wa); background:#1e2010; }
.card-tip .ct { color:var(--wa); font-size:13px; font-weight:600; }
.card-tip .cd { color:#b0a070; font-size:12px; margin-top:4px; line-height:1.5; }
.sec-title { font-size:13px; font-weight:600; color:var(--osv); margin:16px 16px 8px; text-transform:uppercase; letter-spacing:.5px; }
.mode-group { margin:0 16px; }
.mode-card { display:flex; align-items:flex-start; gap:14px; padding:16px; margin-bottom:10px; background:var(--s); border:2px solid var(--ol); border-radius:var(--r); cursor:pointer; transition:all .3s cubic-bezier(.4,0,.2,1); position:relative; overflow:hidden; box-shadow:var(--e1); }
.mode-card:active { transform:scale(.98); }
.mode-card.selected { border-color:var(--p); background:linear-gradient(135deg,var(--p)08 0%,transparent 60%); box-shadow:0 0 0 1px var(--p)22,var(--e2); }
.mode-radio { width:22px; height:22px; min-width:22px; border-radius:50%; border:2px solid var(--osv); display:flex; align-items:center; justify-content:center; margin-top:2px; transition:all .3s; }
.mode-card.selected .mode-radio { border-color:var(--p); }
.mode-radio::after { content:''; width:12px; height:12px; border-radius:50%; background:transparent; transition:all .2s; }
.mode-card.selected .mode-radio::after { background:var(--p); box-shadow:0 0 8px var(--p); }
.mode-content { flex:1; min-width:0; }
.mode-title { font-size:15px; font-weight:600; color:var(--os); }
.mode-subtitle { font-size:12px; color:var(--osv); margin-top:2px; }
.param-preview { margin-top:0; max-height:0; overflow:hidden; transition:all .35s cubic-bezier(.4,0,.2,1); opacity:0; }
.mode-card.selected .param-preview { margin-top:12px; max-height:200px; opacity:1; }
.param-grid { display:flex; flex-wrap:wrap; gap:4px; }
.param-tag { padding:4px 10px; border-radius:99px; font-size:11px; background:var(--sv); color:var(--p); border:1px solid var(--p)33; }
.btn { display:flex; align-items:center; justify-content:center; gap:8px; width:calc(100%-32px); margin:8px 16px; padding:14px; border:none; border-radius:var(--r); font-size:15px; font-weight:600; cursor:pointer; position:relative; overflow:hidden; transition:transform .15s,box-shadow .2s; box-shadow:var(--e1); }
.btn:active { transform:scale(.97); }
.btn-primary { background:var(--p); color:var(--op); }
.btn-danger { background:var(--er); color:#fff; }
.ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,.15); transform:scale(0); animation:ripple .6s ease-out; pointer-events:none; }
@keyframes ripple { to { transform:scale(4); opacity:0; } }
.fab-container { position:fixed; bottom:calc(24px+var(--inset-b)); right:20px; z-index:1000; display:flex; flex-direction:column-reverse; align-items:center; gap:12px; }
.fab-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.4); opacity:0; visibility:hidden; transition:all .3s; z-index:999; backdrop-filter:blur(2px); }
.fab-backdrop.open { opacity:1; visibility:visible; }
.fab-main { width:56px; height:56px; border-radius:16px; border:none; background:var(--p); color:var(--op); cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--e3); transition:all .3s cubic-bezier(.4,0,.2,1); position:relative; z-index:1001; }
.fab-main:active { transform:scale(.92); }
.fab-main svg { transition:transform .3s; }
.fab-main.open svg { transform:rotate(45deg); }
.fab-item { width:48px; height:48px; border-radius:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--e2); position:relative; z-index:1001; transform:scale(0); opacity:0; transition:all .3s cubic-bezier(.4,0,.2,1); }
.fab-container.open .fab-item { transform:scale(1); opacity:1; }
.fab-item:nth-child(1) { transition-delay:.05s; }
.fab-item:nth-child(2) { transition-delay:.1s; }
.fab-item:nth-child(3) { transition-delay:.15s; }
.fab-label { position:absolute; right:60px; white-space:nowrap; padding:4px 12px; border-radius:8px; background:var(--s); font-size:12px; font-weight:500; color:var(--os); border:1px solid var(--ol); box-shadow:var(--e1); opacity:0; transform:translateX(10px); transition:all .25s; pointer-events:none; }
.fab-item:hover .fab-label { opacity:1; transform:translateX(0); }
.snackbar { position:fixed; bottom:calc(90px+var(--inset-b)); left:50%; transform:translateX(-50%) translateY(80px); max-width:calc(100%-48px); min-width:280px; padding:14px 20px; border-radius:12px; background:#2a2a3e; border:1px solid var(--ol); box-shadow:var(--e3); z-index:2000; display:flex; align-items:center; gap:10px; opacity:0; transition:all .35s cubic-bezier(.4,0,.2,1); pointer-events:none; }
.snackbar.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.snackbar .snk-icon { width:20px; height:20px; flex-shrink:0; }
.snackbar .snk-text { font-size:13px; color:var(--os); line-height:1.4; flex:1; }
.dialog-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:3000; display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:all .25s; backdrop-filter:blur(3px); }
.dialog-overlay.open { opacity:1; visibility:visible; }
.dialog-box { background:var(--s); border:1px solid var(--ol); border-radius:20px; padding:24px 20px 16px; width:calc(100%-64px); max-width:340px; box-shadow:var(--e3); transform:scale(.9); transition:transform .25s; }
.dialog-overlay.open .dialog-box { transform:scale(1); }
.dialog-title { font-size:17px; font-weight:700; color:var(--os); margin-bottom:8px; }
.dialog-msg { font-size:14px; color:var(--osv); line-height:1.5; margin-bottom:20px; }
.dialog-actions { display:flex; gap:8px; justify-content:flex-end; }
.dialog-actions button { padding:10px 20px; border-radius:12px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .2s; }
.dialog-actions button:active { opacity:.7; }
.dialog-cancel { background:var(--sv); color:var(--os); }
.dialog-confirm { background:var(--er); color:#fff; }
</style>
</head>
<body>

<div class="header">
  <h1>界面美化微调</h1>
  <div class="sub">DPI · 动画缩放 · 刷新率 · 状态栏 三档预设</div>
</div>

<div class="card card-tip">
  <div class="ct">&#9432; 重要说明</div>
  <div class="cd">全部使用 settings 属性修改（ADB 权限可用），重启后失效需重新切换。不替换 system/framework，安全无风险。</div>
</div>

<div class="sec-title">&#9679; 选择界面风格</div>
<div class="mode-group" id="modeGroup"></div>

<button class="btn btn-danger" onclick="showDialog()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
  恢复系统默认
</button>

<div class="fab-backdrop" id="fabBackdrop" onclick="toggleFab()"></div>
<div class="fab-container" id="fabContainer">
  <button class="fab-main" id="fabMain" onclick="toggleFab()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<div class="snackbar" id="snackbar">
  <div class="snk-icon" id="snkIcon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--su)" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div>
  <div class="snk-text" id="snkText">操作成功</div>
</div>

<div class="dialog-overlay" id="dialogOverlay">
  <div class="dialog-box">
    <div class="dialog-title">确认恢复默认？</div>
    <div class="dialog-msg">将清除所有自定义 DPI／动画／刷新率设置，恢复系统默认值。建议重启后生效。</div>
    <div class="dialog-actions">
      <button class="dialog-cancel" onclick="closeDialog()">取消</button>
      <button class="dialog-confirm" onclick="confirmReset()">确认恢复</button>
    </div>
  </div>
</div>

<script>
const MODDIR = '/data/user_de/0/com.android.shell/axeron/plugins/system_ui_tweak_ax';
const modes = [
  { id:'smooth', color:'#f87171', title:'🌊 清爽高性能', subtitle:'快速动画 · 小视野 · 高刷常驻',
    params:['窗口动画: 0.5x','过渡动画: 0.5x','时长缩放: 0.5x','DPI: 380','峰值刷新: 120Hz','状态栏: 28dp'] },
  { id:'balanced', color:'#fbbf24', title:'🌿 原生均衡', subtitle:'系统默认动画 · 标准DPI',
    params:['窗口动画: 1.0x','过渡动画: 1.0x','时长缩放: 1.0x','DPI: 440','峰值刷新: 90Hz','状态栏: 32dp'] },
  { id:'eye_care', color:'#4ade80', title:'👁️ 护眼省电', subtitle:'放缓动画 · 大字大图标 · 低刷省电',
    params:['窗口动画: 1.5x','过渡动画: 1.5x','时长缩放: 1.5x','DPI: 480','峰值刷新: 60Hz','息屏刷新: 10Hz'] }
];
let selectedMode = 'balanced';
const group = document.getElementById('modeGroup');
modes.forEach(m => {
  const card = document.createElement('div');
  card.className = 'mode-card' + (m.id === selectedMode ? ' selected' : '');
  card.dataset.mode = m.id;
  card.innerHTML = `<div class="mode-radio"></div><div class="mode-content"><div class="mode-title">${m.title}</div><div class="mode-subtitle">${m.subtitle}</div><div class="param-preview"><div class="param-grid">${m.params.map(p => `<span class="param-tag">${p}</span>`).join('')}</div></div></div>`;
  card.addEventListener('click', function() {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
    this.classList.add('selected'); selectedMode = this.dataset.mode; closeFab();
  });
  group.appendChild(card);
});
modes.forEach((m,i) => {
  const item = document.createElement('button');
  item.className = 'fab-item'; item.style.cssText = `background:${m.color};transition-delay:${(i*0.05)+0.05}s`;
  item.dataset.mode = m.id;
  const label = ['流畅','均衡','护眼'][i];
  item.innerHTML = `<span class="fab-label">${label}模式</span>${label}`;
  item.addEventListener('click', function() {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`.mode-card[data-mode="${this.dataset.mode}"]`).classList.add('selected');
    selectedMode = this.dataset.mode; closeFab();
    execCmd('sh '+MODDIR+'/install.sh '+selectedMode, '正在切换...');
  });
  document.getElementById('fabContainer').insertBefore(item, document.getElementById('fabMain'));
});
function toggleFab() { const c=document.getElementById('fabContainer'),b=document.getElementById('fabBackdrop'),m=document.getElementById('fabMain'); const o=c.classList.toggle('open'); b.classList.toggle('open',o); m.classList.toggle('open',o); }
function closeFab() { document.getElementById('fabContainer').classList.remove('open'); document.getElementById('fabBackdrop').classList.remove('open'); document.getElementById('fabMain').classList.remove('open'); }
let snackbarTimer;
function showSnackbar(text,type) {
  const sb=document.getElementById('snackbar'),icon=document.getElementById('snkIcon');
  clearTimeout(snackbarTimer); sb.classList.remove('show');
  setTimeout(() => {
    document.getElementById('snkText').textContent=text;
    const color=type==='success'?'var(--su)':type==='error'?'var(--er)':'var(--wa)';
    icon.innerHTML=type==='success'?'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>':'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
    sb.classList.add('show'); snackbarTimer = setTimeout(() => sb.classList.remove('show'), 3000);
  }, 50);
}
function execCmd(cmd,msg) {
  showSnackbar(msg+' 请稍候...','info');
  try {
    let output='';
    if(typeof ksu !== 'undefined' && typeof ksu.exec === 'function') {
      output=String(ksu.exec(cmd));
      const lines=output.trim().split('\n');
      showSnackbar(lines.pop()||'执行完成','success');
    } else if(typeof kernelsu !== 'undefined' && typeof kernelsu.exec === 'function') {
      kernelsu.exec(cmd).then(function(r) {
        const t=(r.stdout||r.stderr||'执行完成').trim();
        showSnackbar(t.split('\n').pop(),'success');
      }).catch(function(e){showSnackbar('执行失败: '+e.message,'error');});
    } else if(typeof Axeron !== 'undefined' && typeof Axeron.exec === 'function') {
      const j=Axeron.exec(cmd,null);
      output=j?JSON.parse(j).out||'':'';
      const lines=output.trim().split('\n');
      showSnackbar(lines.pop()||'执行完成','success');
    } else { showSnackbar('请在 AXManager 中打开此面板','info'); }
  } catch(e) { showSnackbar('执行失败: '+e.message,'error'); }
}
function showDialog() { document.getElementById('dialogOverlay').classList.add('open'); }
function closeDialog() { document.getElementById('dialogOverlay').classList.remove('open'); }
function confirmReset() { closeDialog(); execCmd('sh '+MODDIR+'/uninstall.sh','正在恢复默认...'); }
document.querySelectorAll('.btn,.fab-main,.fab-item,.dialog-actions button').forEach(el => {
  el.addEventListener('click', function(e) {
    const r=document.createElement('span'); r.className='ripple';
    const rect=this.getBoundingClientRect();
    r.style.cssText=`left:${e.clientX-rect.left-10}px;top:${e.clientY-rect.top-10}px;width:20px;height:20px`;
    this.appendChild(r); setTimeout(() => r.remove(), 600);
  });
});
</script>
</body>
</html>
