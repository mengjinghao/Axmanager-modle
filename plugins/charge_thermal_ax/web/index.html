<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>充电温控优化</title>
<style>
:root {
  --p: #f472b6; --s: #1e1e2e; --sv: #2a2a3e; --os: #e8e6f0; --osv: #9b99ad;
  --ol: #3d3d55; --er: #f87171; --su: #4ade80; --wa: #fbbf24; --r: 16px;
  --inset-b: env(safe-area-inset-bottom,0px); --inset-t: env(safe-area-inset-top,0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,system-ui,sans-serif; background:#111118; color:var(--os); padding:0 0 calc(80px+var(--inset-b)) 0; min-height:100vh; }
.header { padding:calc(20px+var(--inset-t)) 20px 16px; background:linear-gradient(135deg,var(--p)18 0%,transparent 70%); }
.header h1 { font-size:22px; font-weight:700; color:var(--p); }
.header .sub { font-size:13px; color:var(--osv); margin-top:4px; }
.warn { margin:12px 16px; padding:12px; border-radius:12px; background:#2a1018; border-left:3px solid var(--wa); font-size:12px; color:#c09090; line-height:1.5; }
.card { background:var(--s); border:1px solid var(--ol); border-radius:var(--r); padding:16px; margin:8px 16px; }
.card-title { font-size:14px; font-weight:600; margin-bottom:4px; }
.card-desc { font-size:12px; color:var(--osv); line-height:1.5; }
.mode-btn { display:flex; align-items:center; gap:10px; width:calc(100%-32px); margin:8px 16px; padding:14px 16px; border:none; border-radius:var(--r); font-size:14px; font-weight:600; cursor:pointer; text-align:left; background:var(--s); color:var(--os); border:1px solid var(--ol); transition:all .2s; }
.mode-btn:active { transform:scale(.98); opacity:.8; }
.mode-btn .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.btn-apply { width:calc(100%-32px); margin:8px 16px; padding:14px; border:none; border-radius:var(--r); font-size:15px; font-weight:600; cursor:pointer; background:var(--p); color:#0d0210; }
.btn-reset { width:calc(100%-32px); margin:8px 16px; padding:14px; border:none; border-radius:var(--r); font-size:15px; font-weight:600; cursor:pointer; background:var(--er); color:#fff; }
.btn:active { transform:scale(.97); }
.status { margin:8px 16px; padding:12px; border-radius:12px; background:var(--sv); font-size:13px; color:var(--osv); display:none; }
.status.show { display:block; }
.status.ok { color:var(--su); }
.status.err { color:var(--er); }
</style>
</head>
<body>
<div class="header"><h1>充电温控优化</h1><div class="sub">充电电流 · 电池温度 · 息屏策略 三档切换</div></div>

<div class="warn">
<strong>&#9888; 重要提醒：</strong>所有修改为ADB表层临时属性，手机重启后全部失效需重新切换。不修改硬件驱动，安全可逆。
</div>

<div class="card">
<div class="card-title">&#9679; 档位说明</div>
<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">
<span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">快充均衡: 5A·45°C·息屏加速</span>
<span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">低温慢充: 2.5A·38°C·降功率</span>
<span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">极限温控: 1.5A·35°C·深度省电</span>
</div>
</div>

<button class="mode-btn" data-mode="fast_charge" onclick="applyMode(this)">
<span class="dot" style="background:#f87171"></span>快充均衡 — 5A电流上限 · 45°C温控 · 息屏加速充电
</button>
<button class="mode-btn" data-mode="cool_charge" onclick="applyMode(this)">
<span class="dot" style="background:#fbbf24"></span>低温慢充 — 2.5A低调功率 · 38°C低温阈值 · 降功率保电池
</button>
<button class="mode-btn" data-mode="power_charge" onclick="applyMode(this)">
<span class="dot" style="background:#4ade80"></span>极限温控省电 — 1.5A超低功耗 · 35°C极低温 · 深度省电
</button>

<div class="card" style="margin-top:8px">
<div class="card-title">&#128161; 高温保护说明</div>
<div class="card-desc">切换低温/极限模式后，充电功率将显著降低，电池温度控制在安全范围。适合夜间充电或环境温度较高场景。快充仅在散热良好的环境下使用。</div>
</div>

<button class="btn-reset" onclick="resetAll()">一键恢复原厂充电参数</button>
<div class="status" id="status"></div>

<script>
const MODDIR = '/data/user_de/0/com.android.shell/axeron/plugins/charge_thermal_ax';

function applyMode(btn) {
  const mode = btn.dataset.mode;
  const names = {fast_charge:'快充均衡', cool_charge:'低温慢充', power_charge:'极限温控省电'};
  const s = document.getElementById('status');
  s.className = 'status show';
  s.textContent = '正在切换到 ' + names[mode] + '...';
  execCmd('sh ' + MODDIR + '/install.sh ' + mode).then(function(out) {
    s.textContent = out || names[mode] + ' 已生效';
    s.className = 'status show ok';
  }).catch(function(e) {
    s.textContent = '执行失败：' + (e.message || e);
    s.className = 'status show err';
  });
}

function resetAll() {
  const s = document.getElementById('status');
  s.className = 'status show';
  s.textContent = '正在恢复原厂参数...';
  execCmd('sh ' + MODDIR + '/uninstall.sh').then(function(out) {
    s.textContent = out || '已恢复原厂默认';
    s.className = 'status show ok';
  }).catch(function(e) {
    s.textContent = '执行失败：' + (e.message || e);
    s.className = 'status show err';
  });
}

function execCmd(cmd) {
  return new Promise(function(resolve, reject) {
    try {
      if (typeof ksu !== 'undefined' && typeof ksu.exec === 'function') {
        resolve(String(ksu.exec(cmd)).trim());
      } else if (typeof kernelsu !== 'undefined' && typeof kernelsu.exec === 'function') {
        kernelsu.exec(cmd).then(function(r) {
          resolve((r.stdout || r.stderr || '完成').trim());
        }).catch(reject);
      } else if (typeof Axeron !== 'undefined' && typeof Axeron.exec === 'function') {
        var j = Axeron.exec(cmd, null);
        resolve(j ? JSON.parse(j).out || '完成' : '完成');
      } else {
        reject(new Error('请在AXManager中打开'));
      }
    } catch(e) { reject(e); }
  });
}
</script>
</body>
</html>
