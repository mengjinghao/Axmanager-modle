<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>进程守护</title>
<style>:root{--p:#34d399;--s:#1a1a28;--sv:#252538;--os:#e8e6f0;--osv:#9b99ad;--ol:#353550;--er:#f87171;--su:#4ade80;--wa:#fbbf24;--r:18px;--inset-b:env(safe-area-inset-bottom,0px);--inset-t:env(safe-area-inset-top,0px)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,'PingFang SC','Noto Sans SC',system-ui,sans-serif;background:#0d0d18;color:var(--os);min-height:100vh;overflow-x:hidden}.hdr{position:relative;padding:calc(32px+var(--inset-t)) 20px 24px;overflow:hidden}.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% -20%,var(--p)22,transparent 60%)}.hdr::after{content:'';position:absolute;inset:0;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);mask:linear-gradient(to bottom,#000 40%,transparent)}.hdr-inner{position:relative;z-index:1}.hdr h1{font-size:26px;font-weight:800;color:var(--p);letter-spacing:-.5px;margin-bottom:4px}.hdr .sub{font-size:13px;color:var(--osv);opacity:.8}.hdr .icon-row{display:flex;gap:6px;margin-top:12px}.hdr .chip{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:500;background:var(--p)18;color:var(--p);border:1px solid var(--p)33}.sect{margin:20px 16px 8px;font-size:12px;font-weight:700;color:var(--osv);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}.sect::after{content:'';flex:1;height:1px;background:var(--ol)}.row{display:flex;gap:8px;margin:8px 16px;flex-wrap:wrap}.act-btn{flex:1;min-width:80px;padding:14px 10px;border:none;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;background:var(--s);color:var(--os);border:1.5px solid var(--ol);transition:all .2s}.act-btn:active{transform:scale(.96)}.act-btn.red{background:#2a1018;border-color:#f87171;color:#f87171}.act-btn.green{background:#102a18;border-color:#4ade80;color:#4ade80}.act-btn.amber{background:#2a2010;border-color:#fbbf24;color:#fbbf24}.input-row{display:flex;gap:8px;margin:0 16px 8px}.input-row input{flex:1;padding:12px 14px;border-radius:12px;background:var(--s);color:var(--os);border:1.5px solid var(--ol);font-size:14px}.input-row input:focus{outline:none;border-color:var(--p)}.btn-reset{display:block;width:calc(100%-32px);margin:8px 16px;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;background:transparent;color:var(--er);border:1.5px solid var(--er)33}.toast{position:fixed;bottom:calc(90px+var(--inset-b));left:50%;transform:translateX(-50%) translateY(100px);max-width:calc(100%-48px);min-width:260px;padding:14px 18px;border-radius:16px;background:var(--s);border:1px solid var(--ol);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;gap:10px;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}.toast .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1s infinite}.toast .dot.ok{background:var(--su);animation:none}.toast .dot.err{background:var(--er);animation:none}.toast .dot.busy{background:var(--p)}.toast .msg{font-size:13px;color:var(--os);line-height:1.4;flex:1}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.ft{text-align:center;padding:20px 16px 30px;font-size:11px;color:var(--osv);opacity:.5;line-height:1.6}</style>
</head>
<body>
<div class="hdr"><div class="hdr-inner"><h1>进程与守护</h1><div class="sub">进程查看 · 结束进程 · 内存诊断 · OOM信息</div><div class="icon-row"><span class="chip">ps</span><span class="chip">am force-stop</span><span class="chip">dumpsys</span></div></div></div>
<div class="sect"><span>📋 诊断查看</span></div>
<div class="row"><button class="act-btn" onclick="run('top')">TOP进程</button><button class="act-btn amber" onclick="run('meminfo')">内存TOP10</button></div>
<div class="sect"><span>⚡ 进程操作</span></div>
<div class="input-row"><input id="pkgInput" placeholder="输入包名，如 com.tencent.mm"></div>
<div class="row"><button class="act-btn green" onclick="runWithPkg('info')">进程详情</button><button class="act-btn red" onclick="runWithPkg('kill')">强制结束</button><button class="act-btn red" onclick="run('killall_bg')" style="flex:2">结束全部后台进程</button></div>
<button class="btn-reset" onclick="resetAll()">卸载清理</button>
<div class="toast" id="toast"><div class="dot" id="tdot"></div><div class="msg" id="tmsg"></div></div>
<div class="ft">AXManager Plugin · Shell UID(2000) · 安全可逆</div>
<script>
const MODDIR='/data/user_de/0/com.android.shell/axeron/plugins/process_guard_ax';
let tt=null;function toast(m,t){const e=document.getElementById('toast'),td=document.getElementById('tdot'),tm=document.getElementById('tmsg');clearTimeout(tt);e.classList.remove('show');td.className='dot';tm.textContent='';setTimeout(function(){tm.textContent=m;td.className='dot '+(t||'busy');e.classList.add('show');if(t!=='busy')tt=setTimeout(function(){e.classList.remove('show')},2500)},80)}
function execCmd(cmd){return new Promise(function(res,rej){try{if(typeof ksu!=='undefined'&&typeof ksu.exec==='function')res(String(ksu.exec(cmd)).trim());else if(typeof kernelsu!=='undefined'&&typeof kernelsu.exec==='function')kernelsu.exec(cmd).then(function(r){res((r.stdout||r.stderr||'完成').trim())}).catch(rej);else if(typeof Axeron!=='undefined'&&typeof Axeron.exec==='function'){var j=Axeron.exec(cmd,null);res(j?JSON.parse(j).out||'完成':'完成')}else rej(new Error('请在AXManager中打开'))}catch(e){rej(e)}})}
function pkg(){return document.getElementById('pkgInput').value.trim()}
async function run(m){const n={top:'TOP进程',meminfo:'内存TOP10',killall_bg:'结束全部后台'};toast('正在加载 '+n[m]+'...','busy');try{const o=await execCmd('sh '+MODDIR+'/install.sh '+m);toast(o||'完成','ok')}catch(e){toast('失败: '+(e.message||e),'err')}}
async function runWithPkg(m){const p=pkg();if(!p){toast('请输入包名','err');return}const n={info:'进程详情',kill:'强制结束'};toast(n[m]+' '+p+'...','busy');try{const o=await execCmd('sh '+MODDIR+'/install.sh '+m+' '+p);toast(o||'完成','ok')}catch(e){toast('失败: '+(e.message||e),'err')}}
async function resetAll(){toast('正在清理...','busy');try{const o=await execCmd('sh '+MODDIR+'/uninstall.sh');toast(o||'已清理','ok')}catch(e){toast('失败: '+(e.message||e),'err')}}
</script>
</body>
</html>
