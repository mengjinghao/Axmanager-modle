<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>音效音量均衡</title>
<style>:root{--p:#818cf8;--s:#1e1e2e;--sv:#2a2a3e;--os:#e8e6f0;--osv:#9b99ad;--ol:#3d3d55;--er:#f87171;--su:#4ade80;--wa:#fbbf24;--r:16px;--inset-b:env(safe-area-inset-bottom,0px);--inset-t:env(safe-area-inset-top,0px)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,system-ui,sans-serif;background:#111118;color:var(--os);padding:0 0 calc(80px+var(--inset-b)) 0;min-height:100vh}.header{padding:calc(20px+var(--inset-t)) 20px 16px;background:linear-gradient(135deg,var(--p)18 0%,transparent 70%)}.header h1{font-size:22px;font-weight:700;color:var(--p)}.header .sub{font-size:13px;color:var(--osv);margin-top:4px}.warn{margin:12px 16px;padding:12px;border-radius:12px;background:#18102a;border-left:3px solid var(--wa);font-size:12px;color:#a090c0;line-height:1.5}.card{background:var(--s);border:1px solid var(--ol);border-radius:var(--r);padding:16px;margin:8px 16px}.card-title{font-size:14px;font-weight:600;margin-bottom:4px}.card-desc{font-size:12px;color:var(--osv);line-height:1.5}.mode-btn{display:flex;align-items:center;gap:10px;width:calc(100%-32px);margin:8px 16px;padding:14px 16px;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;text-align:left;background:var(--s);color:var(--os);border:1px solid var(--ol);transition:all .2s}.mode-btn:active{transform:scale(.98);opacity:.8}.mode-btn .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.btn-reset{display:block;width:calc(100%-32px);margin:8px 16px;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;background:var(--er);color:#fff}.btn-reset:active{transform:scale(.97)}.status{margin:8px 16px;padding:12px;border-radius:12px;background:var(--sv);font-size:13px;color:var(--osv);display:none}.status.show{display:block}.status.ok{color:var(--su)}.status.err{color:var(--er)}</style>
</head>
<body>
<div class="header"><h1>音效音量均衡</h1><div class="sub">音量曲线 · 低音增强 · 通话增益 三档调节</div></div>
<div class="warn"><strong>&#9888; 重要提醒：</strong>仅表层属性调整，不替换声卡驱动/音频库。重启后全部失效需重新切换。</div>
<div class="card"><div class="card-title">&#9679; 参数说明</div><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px"><span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">音量曲线</span><span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">低音增益</span><span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">外放增强</span><span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">音量压缩</span><span style="padding:3px 8px;border-radius:99px;font-size:11px;background:var(--sv);color:var(--p)">听筒/麦增益</span></div></div>

<button class="mode-btn" data-mode="standard" onclick="applyMode(this)"><span class="dot" style="background:#60a5fa"></span>原声标准 — 平整曲线 · 默认音量上限 · 原始增益</button>
<button class="mode-btn" data-mode="bass_boost" onclick="applyMode(this)"><span class="dot" style="background:#f87171"></span>增强低音 — 低频+2dB · 关闭音量压缩 · 立体环绕</button>
<button class="mode-btn" data-mode="call_boost" onclick="applyMode(this)"><span class="dot" style="background:#4ade80"></span>通话增益 — 听筒+3dB · 麦克风+3dB · 人声EQ</button>

<button class="btn-reset" onclick="resetAll()">一键恢复原厂音效参数</button>
<div class="status" id="status"></div>

<script>
const MODDIR = '/data/user_de/0/com.android.shell/axeron/plugins/audio_balance_ax';
function applyMode(btn) { const m=btn.dataset.mode; const n={standard:'原声标准',bass_boost:'增强低音',call_boost:'通话增益'}; const s=document.getElementById('status'); s.className='status show'; s.textContent='正在切换到 '+n[m]+'...'; execCmd('sh '+MODDIR+'/install.sh '+m).then(function(o){s.textContent=o||n[m]+' 已生效';s.className='status show ok'}).catch(function(e){s.textContent='失败：'+e.message;s.className='status show err'}) }
function resetAll() { const s=document.getElementById('status'); s.className='status show'; s.textContent='正在恢复...'; execCmd('sh '+MODDIR+'/uninstall.sh').then(function(o){s.textContent=o||'已恢复默认';s.className='status show ok'}).catch(function(e){s.textContent='失败：'+e.message;s.className='status show err'}) }
function execCmd(cmd) { return new Promise(function(res,rej) { try { if(typeof ksu!=='undefined'&&typeof ksu.exec==='function') res(String(ksu.exec(cmd)).trim()); else if(typeof kernelsu!=='undefined'&&typeof kernelsu.exec==='function') kernelsu.exec(cmd).then(function(r){res((r.stdout||r.stderr||'完成').trim())}).catch(rej); else if(typeof Axeron!=='undefined'&&typeof Axeron.exec==='function'){var j=Axeron.exec(cmd,null);res(j?JSON.parse(j).out||'完成':'完成')}else rej(new Error('请在AXManager中打开')); }catch(e){rej(e)} }) }
</script>
</body>
</html>
